<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表板 - 背单词系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 二次元背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(173, 216, 230, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(221, 160, 221, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* 浮动装饰元素 */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .floating-star {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .welcome-text {
            font-size: 1rem;
            color: #555;
            font-weight: 500;
        }
        
        .logout-btn {
            background: linear-gradient(135deg, #ff7675, #fd79a8);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(255, 118, 117, 0.4);
        }
        
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 118, 117, 0.6);
        }
        
        .main-content {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }
        
        .welcome-card h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .welcome-card p {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #fecfef);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .stat-label {
            color: #666;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        
        .feature-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #a8edea, #fed6e3);
        }
        
        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .feature-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.1));
        }
        
        .feature-card h3 {
            color: #667eea;
            font-size: 1.4rem;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .feature-card p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 400;
        }
        
        .feature-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .feature-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .feature-btn.stats {
            background: linear-gradient(135deg, #fd79a8, #fdcb6e);
            box-shadow: 0 4px 15px rgba(253, 121, 168, 0.4);
        }
        
        .feature-btn.stats:hover {
            box-shadow: 0 8px 25px rgba(253, 121, 168, 0.6);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-content {
                padding: 0 15px;
            }
            
            .welcome-card h1 {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .welcome-card, .stat-card, .feature-card {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }
        
        .feature-card:nth-child(2) { animation-delay: 0.1s; }
        .feature-card:nth-child(3) { animation-delay: 0.2s; }
        .feature-card:nth-child(4) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <!-- 浮动装饰元素 -->
    <div class="floating-elements">
        <div class="floating-star" style="top: 10%; left: 10%; font-size: 20px;">⭐</div>
        <div class="floating-star" style="top: 20%; right: 15%; font-size: 16px; animation-delay: -2s;">✨</div>
        <div class="floating-star" style="top: 60%; left: 5%; font-size: 18px; animation-delay: -4s;">💫</div>
        <div class="floating-star" style="top: 80%; right: 10%; font-size: 22px; animation-delay: -1s;">🌟</div>
        <div class="floating-star" style="top: 40%; right: 25%; font-size: 14px; animation-delay: -3s;">⚡</div>
    </div>

    <header class="header">
        <div class="header-content">
            <div class="logo">🌸 背单词系统</div>
            <div class="user-info">
                <span class="welcome-text">欢迎回来，<span th:text="${username}">用户</span>！</span>
                <a th:href="@{/auth/logout}" class="logout-btn">退出登录</a>
            </div>
        </div>
    </header>
    
    <main class="main-content">
        <div class="welcome-card">
            <h1>🎀 欢迎来到背单词系统</h1>
            <p>开始您的英语学习之旅，提升词汇量，掌握更多单词！</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalLearned}">0</div>
                <div class="stat-label">📚 已学单词</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${learning}">0</div>
                <div class="stat-label">📖 学习中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${mastered}">0</div>
                <div class="stat-label">⭐ 已掌握</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${learningDays}">0</div>
                <div class="stat-label">📅 学习天数</div>
            </div>
        </div>
        
        <div class="feature-grid">
            <div class="feature-card">
                <div class="feature-icon">📚</div>
                <h3>开始学习</h3>
                <p>选择词汇书，开始您的单词学习之旅</p>
                <a th:href="@{/learning/study}" class="feature-btn">立即开始</a>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">📚</div>
                <h3>学习历史</h3>
                <p>查看已学单词的详细记录和学习进度</p>
                <a th:href="@{/learning/history}" class="feature-btn">查看历史</a>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">📊</div>
                <h3>学习统计</h3>
                <p>查看您的学习进度和统计数据</p>
                <a th:href="@{/stats/learning}" class="feature-btn stats">查看统计</a>
            </div>
            
            <div class="feature-card">
                <div class="feature-icon">⚙️</div>
                <h3>个人设置</h3>
                <p>自定义学习计划和个人偏好</p>
                <a th:href="@{/settings}" class="feature-btn">进入设置</a>
            </div>
        </div>
    </main>
</body>
</html>
