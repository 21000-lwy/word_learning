<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 单词学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .user-info {
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: #ff6b6b;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .users-table-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow-x: auto;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            color: white;
        }

        .users-table th,
        .users-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .users-table th {
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .users-table tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .role-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .role-admin {
            background: #ff6b6b;
            color: white;
        }

        .role-user {
            background: #4ecdc4;
            color: white;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
        }

        .btn-toggle {
            background: #ffa726;
            color: white;
        }

        .btn-toggle:hover {
            background: #ff9800;
        }

        .btn-delete {
            background: #ef5350;
            color: white;
        }

        .btn-delete:hover {
            background: #f44336;
        }

        .no-users {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 2rem;
            opacity: 0.8;
        }

        .decorative-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        .star:nth-child(1) { top: 20%; left: 10%; width: 2px; height: 2px; animation-delay: 0s; }
        .star:nth-child(2) { top: 80%; left: 20%; width: 3px; height: 3px; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 40%; left: 80%; width: 2px; height: 2px; animation-delay: 1s; }
        .star:nth-child(4) { top: 70%; left: 70%; width: 3px; height: 3px; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 10%; left: 60%; width: 2px; height: 2px; animation-delay: 2s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .users-table-container {
                padding: 1rem;
            }
            
            .users-table th,
            .users-table td {
                padding: 0.5rem;
                font-size: 0.9rem;
            }
            
            .action-btn {
                padding: 0.25rem 0.5rem;
                font-size: 0.7rem;
                margin: 0.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="decorative-elements">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <header class="header">
        <div class="logo">🌸 单词学习系统</div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link">控制台</a>
            <a href="/admin/users" class="nav-link">用户管理</a>
            <a href="/admin/words" class="nav-link">单词管理</a>
        </div>
        <div class="user-info">
            <span th:text="${adminUser.username}">管理员</span>
            <span class="admin-badge">管理员</span>
            <a href="/auth/logout" class="logout-btn">退出登录</a>
        </div>
    </header>

    <div class="container">
        <!-- 显示消息 -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="page-header">
            <h1>用户管理</h1>
            <p>管理系统中的所有用户</p>
        </div>

        <div class="users-table-container">
            <div th:if="${#lists.isEmpty(users)}" class="no-users">
                暂无用户数据
            </div>
            
            <table th:if="${!#lists.isEmpty(users)}" class="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>角色</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}">用户名</td>
                        <td th:text="${user.email}">email@example.com</td>
                        <td>
                            <span th:class="${user.admin ? 'role-badge role-admin' : 'role-badge role-user'}" 
                                  th:text="${user.admin ? 'ADMIN' : 'USER'}">USER</span>
                        </td>
                        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2023-01-01 12:00</td>
                        <td>
                            <form th:action="@{/admin/users/toggle-role/{id}(id=${user.id})}" method="post" style="display: inline;">
                                <button type="submit" class="action-btn btn-toggle" 
                                        th:text="${user.admin ? '设为用户' : '设为管理员'}">切换角色</button>
                            </form>
                            <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display: inline;" 
                                  onsubmit="return confirm('确定要删除这个用户吗？')">
                                <button type="submit" class="action-btn btn-delete">删除</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
