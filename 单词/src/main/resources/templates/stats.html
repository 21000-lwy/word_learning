<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习统计 - 背单词系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 二次元背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(173, 216, 230, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(221, 160, 221, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .header .subtitle {
            color: #666;
            font-size: 1.1rem;
            font-weight: 300;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #fecfef);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }
        
        .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .stat-label {
            color: #666;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .chart-section {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .chart-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
            margin: 20px 0;
        }
        
        .progress-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .progress-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .progress-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .mastery-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .mastery-item:last-child {
            border-bottom: none;
        }
        
        .mastery-label {
            font-weight: 500;
            color: #555;
        }
        
        .mastery-count {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1rem;
        }
        
        .back-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .actions {
            text-align: center;
            margin-top: 30px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .progress-section {
                grid-template-columns: 1fr;
            }
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stat-card, .chart-section, .progress-card {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }
        .stat-card:nth-child(4) { animation-delay: 0.3s; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 学习统计</h1>
            <p class="subtitle" th:text="'欢迎回来，' + ${username} + '！查看你的学习成果吧～'">欢迎回来！查看你的学习成果吧～</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-icon">📚</span>
                <div class="stat-number" th:text="${stats.totalWords}">0</div>
                <div class="stat-label">总学习单词</div>
            </div>
            
            <div class="stat-card">
                <span class="stat-icon">✅</span>
                <div class="stat-number" th:text="${stats.masteredWords}">0</div>
                <div class="stat-label">已掌握单词</div>
            </div>
            
            <div class="stat-card">
                <span class="stat-icon">📅</span>
                <div class="stat-number" th:text="${learningDays}">0</div>
                <div class="stat-label">学习天数</div>
            </div>
            
            <div class="stat-card">
                <span class="stat-icon">🎯</span>
                <div class="stat-number" th:text="${accuracy} + '%'">0%</div>
                <div class="stat-label">学习准确率</div>
            </div>
        </div>
        
        <div class="chart-section">
            <h3 class="chart-title">📈 最近7天学习趋势</h3>
            <div class="chart-container">
                <canvas id="learningChart"></canvas>
            </div>
        </div>
        
        <div class="progress-section">
            <div class="progress-card">
                <h3 class="progress-title">🎨 掌握度分布</h3>
                <div class="mastery-item">
                    <span class="mastery-label">💫 未学习</span>
                    <span class="mastery-count" th:text="${masteryDistribution['未学习']}">0</span>
                </div>
                <div class="mastery-item">
                    <span class="mastery-label">📖 学习中</span>
                    <span class="mastery-count" th:text="${masteryDistribution['学习中']}">0</span>
                </div>
                <div class="mastery-item">
                    <span class="mastery-label">⭐ 已掌握</span>
                    <span class="mastery-count" th:text="${masteryDistribution['已掌握']}">0</span>
                </div>
            </div>
            
            <div class="progress-card">
                <h3 class="progress-title">🌟 学习成就</h3>
                <div class="mastery-item">
                    <span class="mastery-label">🏆 学习等级</span>
                    <span class="mastery-count" th:text="${stats.totalWords < 50 ? '新手' : (stats.totalWords < 200 ? '进阶' : '专家')}">新手</span>
                </div>
                <div class="mastery-item">
                    <span class="mastery-label">🔥 连续学习</span>
                    <span class="mastery-count" th:text="${learningDays} + '天'">0天</span>
                </div>
                <div class="mastery-item">
                    <span class="mastery-label">💎 学习积分</span>
                    <span class="mastery-count" th:text="${stats.masteredWords * 10}">0</span>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <a href="/dashboard" class="back-btn">🏠 返回首页</a>
        </div>
    </div>
    
    <script th:inline="javascript">
        // 获取图表数据
        const chartData = /*[[${chartData}]]*/ {};
        
        // 创建学习趋势图表
        const ctx = document.getElementById('learningChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.dates || [],
                datasets: [{
                    label: '学习单词数',
                    data: chartData.counts || [],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#667eea',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: 'rgba(0, 0, 0, 0.1)'
                        },
                        ticks: {
                            color: '#666'
                        }
                    },
                    x: {
                        grid: {
                            color: 'rgba(0, 0, 0, 0.1)'
                        },
                        ticks: {
                            color: '#666'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
