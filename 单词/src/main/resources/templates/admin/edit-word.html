<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑单词 - 单词学习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .user-info {
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-badge {
            background: #ff6b6b;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: white;
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* 下拉框选项样式 */
        .form-input option {
            background: #4a5568;
            color: white;
            padding: 0.5rem;
        }

        .form-input option:hover {
            background: #2d3748;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn-primary {
            background: #2196f3;
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        .btn-primary:hover {
            background: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            text-align: center;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .decorative-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        .star:nth-child(1) { top: 20%; left: 10%; width: 2px; height: 2px; animation-delay: 0s; }
        .star:nth-child(2) { top: 80%; left: 20%; width: 3px; height: 3px; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 40%; left: 80%; width: 2px; height: 2px; animation-delay: 1s; }
        .star:nth-child(4) { top: 70%; left: 70%; width: 3px; height: 3px; animation-delay: 1.5s; }
        .star:nth-child(5) { top: 10%; left: 60%; width: 2px; height: 2px; animation-delay: 2s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .form-container {
                padding: 2rem;
            }
            
            .form-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="decorative-elements">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <header class="header">
        <div class="logo">🌸 单词学习系统</div>
        <div class="nav-links">
            <a href="/admin/dashboard" class="nav-link">控制台</a>
            <a href="/admin/users" class="nav-link">用户管理</a>
            <a href="/admin/words" class="nav-link">单词管理</a>
        </div>
        <div class="user-info">
            <span th:text="${adminUser.username}">管理员</span>
            <span class="admin-badge">管理员</span>
            <a href="/auth/logout" class="logout-btn">退出登录</a>
        </div>
    </header>

    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h1>编辑单词</h1>
                <p>修改单词信息</p>
            </div>

            <!-- 显示错误消息 -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/admin/words/edit/{id}(id=${word.id})}" method="post" th:object="${word}">
                <div class="form-group">
                    <label for="english" class="form-label">英文单词</label>
                    <input type="text" id="english" name="english" th:field="*{english}" 
                           class="form-input" placeholder="请输入英文单词" required>
                </div>

                <div class="form-group">
                    <label for="chinese" class="form-label">中文释义</label>
                    <input type="text" id="chinese" name="chinese" th:field="*{chinese}" 
                           class="form-input" placeholder="请输入中文释义" required>
                </div>

                <div class="form-group">
                    <label for="pronunciation" class="form-label">发音</label>
                    <input type="text" id="pronunciation" name="pronunciation" th:field="*{pronunciation}" 
                           class="form-input" placeholder="请输入发音（如：/həˈloʊ/）">
                </div>

                <div class="form-group">
                    <label for="example" class="form-label">例句</label>
                    <textarea id="example" name="example" th:field="*{example}" 
                              class="form-input" placeholder="请输入例句" rows="3" style="resize: vertical;"></textarea>
                </div>

                <div class="form-group">
                    <label for="difficultyLevel" class="form-label">难度等级</label>
                    <select id="difficultyLevel" name="difficultyLevel" th:field="*{difficultyLevel}" 
                            class="form-input">
                        <option value="1">1级 - 初级</option>
                        <option value="2">2级 - 初中级</option>
                        <option value="3">3级 - 中级</option>
                        <option value="4">4级 - 中高级</option>
                        <option value="5">5级 - 高级</option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">更新单词</button>
                    <a href="/admin/words" class="btn btn-secondary">返回列表</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
